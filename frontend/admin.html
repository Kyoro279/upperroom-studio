<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Admin - The Upper Room / 3D PRINT STUDIO</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="login-layout">
        <div class="login-card">
            <p class="section-tag">AKSES STUDIO</p>
            <h1 class="login-title">Masuk</h1>
            <p class="login-subtitle">Halaman ini hanya untuk owner studio.</p>

            <form class="login-form" action="kelola.html" method="GET">
                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-block">Masuk</button>
            </form>

            <div class="login-footer">
                <a href="#">Belum punya akun? Daftar</a>
                <a href="index.html">&larr; Beranda</a>
            </div>
        </div>
    </main>

</body>

</html>
