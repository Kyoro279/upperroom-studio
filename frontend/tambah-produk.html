<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Produk - The Upper Room / 3D PRINT STUDIO</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="main-layout admin-layout">
        <a href="kelola.html" class="back-link">← Kembali ke Kelola Katalog</a>

        <div class="admin-header">
            <div>
                <p class="section-tag">OWNER PANEL</p>
                <h2>Tambah Produk Baru</h2>
            </div>
        </div>

        <div class="admin-form-container">
            <form id="form-tambah-produk" class="admin-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nama">NAMA PRODUK *</label>
                        <input type="text" id="nama" name="nama" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="harga">HARGA (Rp) *</label>
                        <input type="number" id="harga" name="harga" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="kategori">KATEGORI</label>
                        <select id="kategori" name="kategori">
                            <option value="Dekorasi">Dekorasi</option>
                            <option value="Miniatur">Miniatur</option>
                            <option value="Aksesoris">Aksesoris</option>
                            <option value="Custom">Custom</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="kegunaan">KEGUNAAN</label>
                        <select id="kegunaan" name="kegunaan">
                            <option value="Rumah">Rumah</option>
                            <option value="Kantor">Kantor</option>
                            <option value="Hadiah">Hadiah</option>
                            <option value="Hobi">Hobi</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="dimensi">DIMENSI (contoh: 15x15x20 cm)</label>
                        <input type="text" id="dimensi" name="dimensi">
                    </div>

                    <div class="form-group">
                        <label for="finishing">FINISHING</label>
                        <input type="text" id="finishing" name="finishing" placeholder="Matte Standard">
                    </div>
                    
                    <div class="form-group">
                        <label for="gambar">FILE GAMBAR FOTO (Bisa pilih lebih dari 1)</label>
                        <input type="file" id="gambar" name="gambar" accept="image/*" multiple>
                    </div>

                    <div class="form-group">
                        <label for="model3d">URL MODEL 3D (.glb) opsional</label>
                        <input type="url" id="model3d" name="model3d" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label for="link_tokopedia">LINK TOKOPEDIA (opsional)</label>
                        <input type="url" id="link_tokopedia" name="link_tokopedia" placeholder="https://tokopedia.com/...">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 25px;">
                    <label for="deskripsi">DESKRIPSI</label>
                    <textarea id="deskripsi" name="deskripsi" rows="4"></textarea>
                </div>

                <div id="form-pesan" style="margin-top: 15px; font-size: 14px;"></div>

                <button type="submit" class="btn-dark" style="margin-top: 25px;">Simpan Produk</button>
            </form>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>

</html>
